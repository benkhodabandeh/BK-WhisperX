name: Windows Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "1.1.0"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    permissions:
      contents: write
    timeout-minutes: 60
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress
      - name: Resolve release version
        id: version
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".TrimStart("v")
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Build and test
        shell: powershell
        run: .\scripts\build_windows.ps1 -Version "${{ steps.version.outputs.version }}"
      - name: Create or update GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $assets = @(
            "release/BK-WhisperX-Setup-${{ steps.version.outputs.version }}.exe",
            "release/BK-WhisperX-Portable-${{ steps.version.outputs.version }}.zip",
            "release/SHA256SUMS.txt"
          )
          if (gh release view $tag 2>$null) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --target "${{ github.sha }}" --title "BK WhisperX $tag" --generate-notes
          }
